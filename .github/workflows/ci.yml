name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: bun run build

  installer-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: gbrain-linux-x64
          - os: macos-latest
            target: bun-darwin-x64
            asset: gbrain-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: gbrain-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: mkdir -p release-fixture
      - run: bun run build --compile --target=${{ matrix.target }} --outfile release-fixture/${{ matrix.asset }} src/cli.ts
      - run: |
          cd release-fixture
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" > SHA256SUMS
          else
            shasum -a 256 "${{ matrix.asset }}" > SHA256SUMS
          fi
      - run: |
          install_dir="$RUNNER_TEMP/gbrain-installer"
          mkdir -p "$install_dir"
          chmod +x ./install.sh
          if [ "${{ matrix.asset }}" = "gbrain-darwin-x64" ]; then
            GBRAIN_SKIP_POST_INSTALL_RUN=1 \
            GBRAIN_ASSET_NAME="${{ matrix.asset }}" \
            GBRAIN_RELEASE_BASE_URL="file://$PWD/release-fixture" \
              ./install.sh --dir "$install_dir" --bin-name gbrain-ci-smoke
            file "$install_dir/gbrain-ci-smoke" | tee "$RUNNER_TEMP/gbrain-ci-smoke-file.txt"
            grep -q "x86_64" "$RUNNER_TEMP/gbrain-ci-smoke-file.txt"
          else
            GBRAIN_ASSET_NAME="${{ matrix.asset }}" \
            GBRAIN_RELEASE_BASE_URL="file://$PWD/release-fixture" \
              ./install.sh --dir "$install_dir" --bin-name gbrain-ci-smoke
            "$install_dir/gbrain-ci-smoke" version
          fi

  openclaw-plugin-smoke:
    runs-on: ubuntu-latest
    env:
      HOME: ${{ github.workspace }}/.ci-openclaw-home
    steps:
      - uses: actions/checkout@v6
      - run: npm install -g openclaw@2026.4.2
      - run: mkdir -p "$HOME"
      - run: >
          openclaw onboard --non-interactive --mode local --accept-risk
          --workspace "$RUNNER_TEMP/openclaw-workspace"
          --auth-choice skip
          --skip-channels
          --skip-skills
          --skip-search
          --skip-health
          --skip-ui
          --no-install-daemon
          --json
      - run: openclaw plugins install --link "$GITHUB_WORKSPACE/plugins/openclaw"
      - run: |
          openclaw plugins inspect gbrain | tee "$RUNNER_TEMP/gbrain-plugin.txt"
          grep -q "Status: loaded" "$RUNNER_TEMP/gbrain-plugin.txt"
