name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gbrain-linux-x64
          - os: macos-13
            asset: gbrain-darwin-x64
          - os: macos-latest
            asset: gbrain-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: bun build --compile --outfile ${{ matrix.asset }} src/cli.ts
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - run: find release-assets -type f -exec chmod +x {} +
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*

