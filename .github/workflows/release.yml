name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: gbrain-linux-x64
          - os: macos-13
            asset: gbrain-darwin-x64
          - os: macos-latest
            asset: gbrain-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: bun build --compile --outfile ${{ matrix.asset }} src/cli.ts
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - run: |
          mkdir dist
          find release-assets -type f | while read -r file; do
            base="$(basename "$file")"
            cp "$file" "dist/$base"
            chmod +x "dist/$base"
          done
      - run: |
          cd dist
          sha256sum gbrain-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
