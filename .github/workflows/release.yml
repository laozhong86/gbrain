name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: gbrain-linux-x64
          - os: macos-latest
            target: bun-darwin-x64
            asset: gbrain-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: gbrain-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install
      - run: bun run check
      - run: bun test
      - run: bun build --compile --target=${{ matrix.target }} --outfile ${{ matrix.asset }} src/cli.ts
      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-assets
      - run: |
          mkdir dist
          find release-assets -type f | while read -r file; do
            base="$(basename "$file")"
            cp "$file" "dist/$base"
            chmod +x "dist/$base"
          done
      - run: |
          cd dist
          sha256sum gbrain-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*

  publish-openclaw-package:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - id: npm-auth
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: ${{ steps.npm-auth.outputs.available != 'true' }}
        run: echo "NPM_TOKEN is not configured, skipping plugin publish."
      - if: ${{ steps.npm-auth.outputs.available == 'true' }}
        run: |
          root_version="$(node -p "require('./package.json').version")"
          plugin_version="$(node -p "require('./plugins/openclaw/package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          test "$root_version" = "$tag_version"
          test "$plugin_version" = "$tag_version"
      - if: ${{ steps.npm-auth.outputs.available == 'true' }}
        run: |
          plugin_version="$(node -p "require('./package.json').version")"
          if npm view "@laozhong86/gbrain-openclaw@${plugin_version}" version >/dev/null 2>&1; then
            echo "Package version ${plugin_version} is already published, skipping."
            exit 0
          fi
          npm publish
        working-directory: plugins/openclaw
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
